name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Minimum-Berechtigungen für die moderne Pages-Pipeline (actions/deploy-pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Kein paralleler Deploy; laufenden Deploy nicht abbrechen (sicherer für Live-Site).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, upload artifact
        uses: withastro/action@v3
        with:
          # Node 22 explizit: Astro 6 verlangt >=22.12, Runner-Default ist 20.
          node-version: 22
          package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
